<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Hand (peace sign holding wrench) -->
  <g transform="translate(40, 10)">
    <!-- Wrist / arm -->
    <path d="M55 140 C55 160, 65 175, 65 190 L55 190 C50 175, 45 160, 45 140 Z" fill="#F5A623" stroke="#1B2A4A" stroke-width="3"/>
    
    <!-- Palm -->
    <ellipse cx="58" cy="130" rx="22" ry="20" fill="#F5A623" stroke="#1B2A4A" stroke-width="3"/>
    
    <!-- Index finger -->
    <path d="M45 125 C42 100, 40 80, 42 55 C44 50, 50 48, 52 55 C50 80, 52 100, 55 120" fill="#F5A623" stroke="#1B2A4A" stroke-width="3"/>
    
    <!-- Middle finger -->
    <path d="M58 120 C62 95, 68 75, 72 50 C74 45, 80 43, 82 50 C78 75, 72 95, 68 118" fill="#F5A623" stroke="#1B2A4A" stroke-width="3"/>
    
    <!-- Ring finger (folded) -->
    <path d="M70 125 C75 118, 78 112, 76 108 C74 104, 70 106, 68 112 L66 125" fill="#F5A623" stroke="#1B2A4A" stroke-width="2.5"/>
    
    <!-- Pinky (folded) -->
    <path d="M75 130 C80 125, 82 118, 80 114 C78 110, 74 112, 72 118 L70 128" fill="#F5A623" stroke="#1B2A4A" stroke-width="2.5"/>
    
    <!-- Thumb -->
    <path d="M42 130 C35 125, 30 118, 33 112 C36 108, 40 110, 42 115 L44 125" fill="#F5A623" stroke="#1B2A4A" stroke-width="2.5"/>
    
    <!-- Wrench -->
    <g transform="translate(50, 45) rotate(30)">
      <rect x="-3" y="0" width="6" height="70" rx="2" fill="#8B9BB4" stroke="#1B2A4A" stroke-width="2"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="#8B9BB4" stroke-width="5"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="#1B2A4A" stroke-width="2"/>
      <path d="M-8 -8 L-4 0 L-8 8" fill="#fff" stroke="none"/>
    </g>
    
    <!-- Spark lines -->
    <line x1="95" y1="35" x2="108" y2="28" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="50" x2="115" y2="48" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="98" y1="65" x2="112" y2="68" stroke="#1B2A4A" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Text: SAMADHAN -->
  <text x="100" y="215" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="28" fill="#1B2A4A" letter-spacing="3">SAMADHAN</text>
  
  <!-- Text: Portal -->
  <text x="100" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="18" fill="#1B2A4A">Portal</text>
</svg>
